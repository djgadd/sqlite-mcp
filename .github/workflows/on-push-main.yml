name: "on: push → main"

# Entrypoint: pushes to main (i.e. merged PRs, including the release PR).
# Composes reusable workflows only: run CI, then the release/publish flow.
on:
  push:
    branches: [main]

# Baseline for called workflows; the release job widens its own grant below.
permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/workflow-call.ci.yml

  release:
    # release-please needs contents + PR write; the publish step authenticates
    # to npm via OIDC trusted publishing, which needs id-token: write. With a
    # reusable workflow, id-token must be granted on BOTH this caller job and
    # the child publish job.
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/workflow-call.release.yml
