name: "workflow-call: release"

# Reusable: Release Please + npm publish.
#  - release-please opens/updates the release PR (version bump + CHANGELOG) and,
#    when that PR is merged, creates the tag + GitHub Release.
#  - publish runs only when a release was just created, and pushes to npm.
on:
  # No secrets required: release-please uses the built-in GITHUB_TOKEN, and the
  # publish job authenticates to npm via OIDC trusted publishing (no token).
  workflow_call:

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        # Config: release-please-config.json + .release-please-manifest.json.
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    # npm trusted publishing (OIDC): the trusted publisher on npmjs.com is
    # configured against the ENTRY workflow `on-push-main.yml` and this
    # `production` environment. No NPM_TOKEN.
    environment: production
    permissions:
      contents: read
      id-token: write # OIDC token npm exchanges for a short-lived publish grant
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: npm

      # Trusted publishing requires npm >= 11.5.1; the runner ships npm 10.x.
      - run: npm install -g npm@latest

      - run: npm ci

      # Build + full test suite must pass before publishing.
      - run: npm test

      # OIDC trusted publishing — no token; provenance generated automatically.
      - run: npm publish
