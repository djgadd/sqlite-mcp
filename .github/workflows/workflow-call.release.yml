name: "workflow-call: release"

# Reusable: Release Please + npm publish.
#  - release-please opens/updates the release PR (version bump + CHANGELOG) and,
#    when that PR is merged, creates the tag + GitHub Release.
#  - publish runs only when a release was just created, and pushes to npm.
on:
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: true

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        # Config: release-please-config.json + .release-please-manifest.json.
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      # Build + full test suite must pass before anything is published.
      - run: npm test

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
